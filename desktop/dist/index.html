<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Claude Code</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        background: #1a1a2e;
        color: #eee;
        height: 100vh;
        overflow: hidden;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        background: #16213e;
        padding: 16px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #0f3460;
      }

      h1 {
        font-size: 20px;
        font-weight: 600;
        color: #e94560;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4ade80;
      }

      .status-dot.offline {
        background: #ef4444;
      }

      main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      .sidebar {
        width: 280px;
        background: #16213e;
        border-right: 1px solid #0f3460;
        padding: 16px;
        overflow-y: auto;
      }

      .sidebar-section {
        margin-bottom: 24px;
      }

      .sidebar-title {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 12px;
      }

      .model-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .model-item {
        padding: 12px;
        background: #0f3460;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .model-item:hover {
        background: #1a4a7a;
      }

      .model-item.active {
        background: #e94560;
      }

      .model-name {
        font-weight: 500;
        margin-bottom: 4px;
      }

      .model-info {
        font-size: 12px;
        color: #888;
      }

      .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #1a1a2e;
      }

      .messages {
        flex: 1;
        padding: 24px;
        overflow-y: auto;
      }

      .message {
        margin-bottom: 16px;
        padding: 16px;
        border-radius: 12px;
        max-width: 80%;
      }

      .message.user {
        background: #e94560;
        margin-left: auto;
      }

      .message.assistant {
        background: #16213e;
      }

      .input-area {
        padding: 16px 24px;
        background: #16213e;
        border-top: 1px solid #0f3460;
      }

      .input-container {
        display: flex;
        gap: 12px;
      }

      input[type="text"] {
        flex: 1;
        padding: 12px 16px;
        border: 1px solid #0f3460;
        border-radius: 8px;
        background: #1a1a2e;
        color: #eee;
        font-size: 14px;
      }

      input[type="text"]:focus {
        outline: none;
        border-color: #e94560;
      }

      button {
        padding: 12px 24px;
        background: #e94560;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }

      button:hover {
        background: #d63850;
      }

      button:disabled {
        background: #555;
        cursor: not-allowed;
      }

      .settings-panel {
        padding: 16px;
        background: #0f3460;
        border-radius: 8px;
      }

      .setting-item {
        margin-bottom: 12px;
      }

      .setting-label {
        font-size: 12px;
        color: #888;
        margin-bottom: 4px;
      }

      select {
        width: 100%;
        padding: 8px;
        background: #1a1a2e;
        color: #eee;
        border: 1px solid #0f3460;
        border-radius: 4px;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #888;
      }

      .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid #0f3460;
        border-top-color: #e94560;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-right: 8px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Open Claude Code</h1>
        <div class="status">
          <div class="status-dot" id="ollama-status"></div>
          <span id="status-text">Checking...</span>
        </div>
      </header>
      <main>
        <aside class="sidebar">
          <div class="sidebar-section">
            <div class="sidebar-title">Models</div>
            <div class="model-list" id="model-list">
              <div class="loading">
                <div class="spinner"></div>
                Loading models...
              </div>
            </div>
          </div>
          <div class="sidebar-section">
            <div class="sidebar-title">Settings</div>
            <div class="settings-panel">
              <div class="setting-item">
                <div class="setting-label">API Provider</div>
                <select id="provider-select">
                  <option value="anthropic">Anthropic API</option>
                  <option value="ollama">Ollama (Local)</option>
                </select>
              </div>
              <div class="setting-item">
                <div class="setting-label">Ollama URL</div>
                <input type="text" id="ollama-url" value="http://localhost:11434" />
              </div>
            </div>
          </div>
        </aside>
        <section class="chat-area">
          <div class="messages" id="messages">
            <div class="message assistant">
              Hello! I'm Open Claude Code, running locally with Ollama. How can I help you today?
            </div>
          </div>
          <div class="input-area">
            <div class="input-container">
              <input type="text" id="user-input" placeholder="Type your message..." />
              <button id="send-btn">Send</button>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const invoke = async (cmd, args) => {
        const tauri = window.__TAURI__;
        const coreInvoke = tauri?.core?.invoke;

        if (typeof coreInvoke !== 'function') {
          throw new Error(
            'Tauri bridge is not available. Make sure you are running the Desktop .exe (not opening index.html directly), and restart the app.',
          );
        }

        return coreInvoke(cmd, args);
      };

      // State
      let models = [];
      let selectedModel = null;

      // DOM Elements
      const modelList = document.getElementById('model-list');
      const ollamaStatus = document.getElementById('ollama-status');
      const statusText = document.getElementById('status-text');
      const userInput = document.getElementById('user-input');
      const sendBtn = document.getElementById('send-btn');
      const messages = document.getElementById('messages');
      const providerSelect = document.getElementById('provider-select');
      const ollamaUrl = document.getElementById('ollama-url');

      // Initialize
      async function init() {
        try {
          await invoke('set_ollama_url', { url: ollamaUrl.value });
          await checkOllama();
          await loadModels();

          // Fallback: if no models, use default
          if (models.length === 0) {
            selectedModel = 'llama3.2:1b';
            modelList.innerHTML = '<div class="loading">No models found - using default</div>';
          }

          setupEventListeners();
        } catch (e) {
          const msg = e && e.message ? e.message : String(e);
          ollamaStatus.classList.add('offline');
          statusText.textContent = 'Desktop bridge error';
          modelList.innerHTML = '<div class="loading">' + msg + '</div>';
        }
      }

      async function checkOllama() {
        try {
          const hasOllama = await invoke('check_ollama');
          if (hasOllama) {
            ollamaStatus.classList.remove('offline');
            statusText.textContent = 'Ollama Connected';
          } else {
            ollamaStatus.classList.add('offline');
            statusText.textContent = 'Ollama Not Found';
          }
        } catch (e) {
          ollamaStatus.classList.add('offline');
          const msg = e && e.message ? e.message : String(e);
          statusText.textContent = `Ollama Not Available: ${msg}`;
        }
      }

      async function loadModels() {
        try {
          const ollamaModels = await invoke('get_ollama_models');
          console.log('Models loaded:', ollamaModels);
          models = ollamaModels;
          renderModels();
        } catch (e) {
          console.error('Failed to load models:', e);
          modelList.innerHTML = '<div class="loading">Error: ' + e + '</div>';
        }
      }

      function renderModels() {
        if (models.length === 0) {
          modelList.innerHTML = '<div class="loading">No models available</div>';
          return;
        }

        modelList.innerHTML = models.map(model => `
          <div class="model-item ${selectedModel === model.name ? 'active' : ''}" data-model="${model.name}">
            <div class="model-name">${model.name}</div>
            <div class="model-info">${formatSize(model.size)}</div>
          </div>
        `).join('');

        // Auto-select first model
        if (!selectedModel && models.length > 0) {
          selectedModel = models[0].name;
          renderModels();
        }
      }

      function formatSize(bytes) {
        const gb = bytes / (1024 * 1024 * 1024);
        if (gb >= 1) return `${gb.toFixed(1)} GB`;
        const mb = bytes / (1024 * 1024);
        return `${mb.toFixed(0)} MB`;
      }

      function setupEventListeners() {
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') sendMessage();
        });

        ollamaUrl.addEventListener('change', async () => {
          try {
            await invoke('set_ollama_url', { url: ollamaUrl.value });
            await checkOllama();
            await loadModels();
          } catch (e) {
            console.error('Failed to update Ollama URL:', e);
          }
        });

        modelList.addEventListener('click', async (e) => {
          const item = e.target.closest('.model-item');
          if (item) {
            selectedModel = item.dataset.model;
            await invoke('set_model', { model: selectedModel });
            renderModels();
          }
        });

        providerSelect.addEventListener('change', () => {
          // UI-only for now; backend is Ollama-first.
        });
      }

      async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        // Add user message
        addMessage('user', message);
        userInput.value = '';
        sendBtn.disabled = true;

        // Show loading
        const loadingMsg = addMessage('assistant', 'Thinking...');

        try {
          const response = await invoke('chat', { message });
          loadingMsg.remove();
          addMessage('assistant', response);
        } catch (e) {
          loadingMsg.remove();
          addMessage('assistant', `Error: ${e}`);
        } finally {
          sendBtn.disabled = false;
        }
      }

      function addMessage(role, content) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.textContent = content;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
      }

      // Start
      init();
    </script>
  </body>
</html>
